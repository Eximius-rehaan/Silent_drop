<html>
<head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
    background:
    radial-gradient(circle at top left,#1e3a8a,#0f172a 40%),
    radial-gradient(circle at bottom right,#312e81,#020617 60%);
    
    color:white;
    font-family:Arial,sans-serif;
    padding:20px;
    min-height:100vh;
}

.message{
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);

    border: 1px solid rgba(255,255,255,0.12);
    border-left: 4px solid #3b82f6;

    border-radius: 20px;

    padding: 18px;
    margin: 15px 0;

    box-shadow:
        0 8px 32px rgba(0,0,0,0.35),
        inset 0 1px 0 rgba(255,255,255,0.08);

    transition: all 0.25s ease;
}


.message:active{
    transform:scale(0.98);
}
    
.title{
    font-size:48px;
    font-weight:800;
    letter-spacing:-1px;
}
    
.message small{
    color:#94a3b8;
    font-size:13px;
    display:block;
    margin-top:10px;
    margin-bottom:12px;
}

.message button{
    background:#ef4444;
    border:none;
    padding:8px 16px;
    border-radius:10px;
    color:white;
    font-weight:bold;
}
</style>
</head>

<body>

<h1 class="title">📥 Silent Drop</h1>
<p id="count"></p>
    
<div id="messages"></div>

<script>

if(sessionStorage.getItem("admin") !== "true"){
    location.href = "index.html";
}

const supabaseUrl = "https://lwtxdmyduytcztgtbmwy.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHhkbXlkdXl0Y3p0Z3RibXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc5MjcsImV4cCI6MjA5NjM0MzkyN30.ziw1rJ1XQSfVjE16V9KaOEaV6Hfq7__2iOXfeE7gtUw";

const client =
supabase.createClient(
supabaseUrl,
supabaseKey
);

async function loadMessages(){

  const { data, error } =
  await client
  .from("messages")
  .select("*")
  .order("id",{ascending:false});

  if(error){
    document.getElementById("messages").innerHTML =
      "Error: " + error.message;
    console.log(error);
    return;
  }

  const container =
  document.getElementById("messages");

  container.innerHTML="";

  data.forEach(msg=>{

    container.innerHTML += `
<div class="message">
    <p>${msg.content}</p>

    <small>
        ${msg.created_at
? new Date(msg.created_at).toLocaleString()
: "No timestamp"}
    </small>

    <br>

    <button onclick="deleteMessage(${msg.id})">
        Delete
    </button>
</div>
`;

  });

}


loadMessages();

document.getElementById("count").innerText =
data.length + " messages";

async function deleteMessage(id){

    const { error } = await client
    .from("messages")
    .delete()
    .eq("id", id);

    if(error){
        alert("Failed to delete");
        console.log(error);
    }else{
        loadMessages();
    }
}

setInterval(() => {
    loadMessages();
}, 2000);

</script>

</body>
</html>
