<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

    color:#94a3b8;
    font-size:12px;

}

.message button{
    background:#ef4444;

    cursor:pointer;
    margin-top:10px;
}

<body>

<h1>📥 Inbox</h1>

<div id="messages"></div>

<script>

if(sessionStorage.getItem("admin") !== "true"){
    location.href = "index.html";
}

const supabaseUrl = "https://lwtxdmyduytcztgtbmwy.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHhkbXlkdXl0Y3p0Z3RibXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc5MjcsImV4cCI6MjA5NjM0MzkyN30.ziw1rJ1XQSfVjE16V9KaOEaV6Hfq7__2iOXfeE7gtUw";

const client =
supabase.createClient(
supabaseUrl,
supabaseKey
);

async function loadMessages(){

  const { data, error } =
  await client
  .from("messages")
  .select("*")
  .order("id",{ascending:false});

  if(error){
    document.getElementById("messages").innerHTML =
      "Error: " + error.message;
    console.log(error);
    return;
  }

  const container =
  document.getElementById("messages");

  container.innerHTML="";

  data.forEach(msg=>{

    container.innerHTML += `
<div class="message">
    <p>${msg.content}</p>

    <small>
        ${msg.created_at
? new Date(msg.created_at).toLocaleString()
: "No timestamp"}
    </small>

    <br>

    <button onclick="deleteMessage(${msg.id})">
        Delete
    </button>
</div>
`;

  });

}


loadMessages();

async function deleteMessage(id){

    const { error } = await client
    .from("messages")
    .delete()
    .eq("id", id);

    if(error){
        alert("Failed to delete");
        console.log(error);
    }else{
        loadMessages();
    }
}

setInterval(() => {
    loadMessages();
}, 2000);

</script>

</body>
