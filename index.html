<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Drop</title>

<style>
body{
background:#0f172a;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.card{
width:90%;
max-width:400px;
background:#1e293b;
padding:25px;
border-radius:20px;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#6366f1;
color:white;
border:none;
border-radius:10px;
}

#status{
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
<h1>💬 Silent Drop</h1>

<p>Say whatever you want.</p>

<textarea id="message"
placeholder="Type your message..."></textarea>

<button onclick="sendMessage()">
Send
</button>

<p id="status"></p>

</div>

<script>
function sendMessage(){
document.getElementById("status").innerText =
"Message sent!";
}
</script>

</body>
</html>
