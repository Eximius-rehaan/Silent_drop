<!DOCTYPE html>
<html>
<head>

<style>
body{

}

@keyframes gradient{

50%{background-position:100% 50%;}

0 0 30px rgba(139,92,246,.4),

}

.hero{

}

.hero h1{

    margin-bottom:18px;

}

.features{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

.features span{
    padding:8px 14px;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.08);

}
 
textarea{
    width:100%;
    height:180px;
    padding:20px;

    border:none;
    border-radius:24px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);

    color:white;
    font-size:18px;

    resize:none;
}

 textarea::placeholder{
    color:rgba(255,255,255,0.6);
 }
 textarea:focus{
    outline:none;
    box-shadow:
        0 0 20px rgba(139,92,246,0.5),
        0 0 40px rgba(99,102,241,0.3);
 }
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(135deg,#0f172a,#1e3a8a,#111827);
color:white;
font-size:18px;

.copy-btn{
    margin-top:15px;

.copy-btn:hover{
    transform:translateY(-2px);
}    

.copy-btn{
    max-width:650px;
    margin:20px auto;

button:hover{
transform:scale(1.03);
box-shadow:0 0 25px rgba(139,92,246,.7)
transform:translateY(-2px);
}

#status{
margin-top:10px;
}
#status{
margin-top:10px;
}

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.7),transparent 35%),
radial-gradient(circle at 80% 40%,rgba(255,255,255,.4),transparent 35%),
radial-gradient(circle at 40% 80%,rgba(255,255,255,.4),transparent 35%);

}

@keyframes float{
from{transform:translateY(0);}

}

.credit{

margin-top:20px;
font-size:13px;
color:rgba(255,255,255,.8);
letter-spacing:3px;
  }
#counter{
    text-align:right;
    color:rgba(255,255,255,0.7);
    margin-top:10px;
}

.how-it-works{
    max-width:650px;
    margin:40px auto;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    text-align:center;
}

.how-it-works h2{
    margin-bottom:20px;
    font-size:28px;
}

.steps{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.step{
    flex:1;
    min-width:140px;
    padding:15px;
}

.step span{
    font-size:30px;
    display:block;
    margin-bottom:10px;
}

.toast{
    position:fixed;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    
    background:rgba(0,0,0,0.8);
    color:white;

    padding:14px 24px;
    border-radius:12px;

    backdrop-filter:blur(10px);

    opacity:0;
    visibility:hidden;

    transition:all 0.3s ease;

    z-index:9999;
}

.toast.show{
    opacity:1;
    visibility:visible;
    bottom:50px;
}
    
</style>
</head>

<body>

<div class="particles"></div>

<div class="card">

    <div class="hero">
        <h1>👾 Silent Drop</h1>

        <p class="tagline">
            Send anonymous messages securely and instantly.
        </p>

        <div class="features">
            <span>🔒 Anonymous</span>
            <span>⚡ Instant</span>
            <span>🛡 Secure</span>
        </div>
        
<div class="share-section">
    

</div>
        
    </div>

    <textarea id="message"
    placeholder="Type your message..."></textarea>

    <p id="counter">0/500</p>

    <button onclick="sendMessage()">
        Send
    </button>

    <p class="credit">👾 Silent Drop • By Rehaan</p>

    <p id="status"></p>

</div>
    
<button class="copy-btn" onclick="copyLink()">
    🔗 Share Silent Drop
</button>
</div>

<div class="how-it-works">

    <h2>How It Works</h2>

    <div class="steps">

        <div class="step">
            <span>✍️</span>
            <p>Write your message</p>
        </div>

        <div class="step">
            <span>🚀</span>
            <p>Send instantly</p>
        </div>

        <div class="step">
            <span>👻</span>
            <p>Stay anonymous</p>
        </div>

    </div>

</div>

<div id="toast" class="toast">
    ✅ Message Delivered
</div>
    
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = "https://lwtxdmyduytcztgtbmwy.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHhkbXlkdXl0Y3p0Z3RibXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc5MjcsImV4cCI6MjA5NjM0MzkyN30.ziw1rJ1XQSfVjE16V9KaOEaV6Hfq7__2iOXfeE7gtUw"

const client =
supabase.createClient(
supabaseUrl,
supabaseKey
);
  
const textarea = document.getElementById("message");
const counter = document.getElementById("counter");

let repeatCount = 0;
let lastMessage = "";
let lastRepeatTime = 0;
    
textarea.addEventListener("input", () => {
  counter.innerText = textarea.value.length + "/500";
});


async function sendMessage(){

const msg =
document.getElementById("message").value;

if(!msg){
showToast("✍️ Write a message first","error");
return;
}

const cleanMsg = msg.trim().toLowerCase();
const now = Date.now();

if(cleanMsg === lastMessage){

    repeatCount++;

    if(repeatCount >= 3 &&
       now - lastRepeatTime < 5000){

        showToast(
            "⏳ Wait 5 seconds before repeating again",
            "error"
        );
        return;
    }

}else{

    repeatCount = 0;
}
    
const { error } =
await client
.from("messages")
.insert([
{ content: msg }
]);

if(error){
showToast("❌ Failed to send","error");
}
    
else{

lastMessage = cleanMsg;
lastRepeatTime = Date.now();
    
showToast("✅ Message Delivered","success");
document.getElementById("message").value="";
counter.innerText = "0/500";
}

}
function copyLink(){

    navigator.clipboard.writeText(
        window.location.href
    );

    showToast("🔗 Link Copied","info");
}

function showToast(message, type = "success"){

const toast = document.getElementById("toast");

toast.innerText = message;

toast.className = "toast";

if(type === "success"){
    toast.style.boxShadow = "0 0 20px rgba(0,255,120,.5)";
}

if(type === "error"){
    toast.style.boxShadow = "0 0 20px rgba(255,60,60,.5)";
}

if(type === "info"){
    toast.style.boxShadow = "0 0 20px rgba(0,150,255,.5)";
}

toast.classList.add("show");

setTimeout(() => {
    toast.classList.remove("show");
}, 2500);

}
    
</script>

</html>
