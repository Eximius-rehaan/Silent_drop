<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Drop</title>

<style>
body{
background:#0f172a;
font-family:Arial,sans-serif;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
color:white;
}

.card{
width:90%;
max-width:400px;
background:#1e293b;
padding:25px;
border-radius:20px;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
margin-top:10px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#6366f1;
color:white;
border:none;
border-radius:10px;
}

#status{
margin-top:10px;
}
</style>
</head>

<body>

<div class="card">
<h1>💬 Silent Drop</h1>

<p>Say whatever you want.</p>

<textarea id="message"
placeholder="Type your message..."></textarea>

<button onclick="sendMessage()">
Send
</button>

<p id="status"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = "https://lwtxdmyduytcztgtbmwy.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHhkbXlkdXl0Y3p0Z3RibXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc5MjcsImV4cCI6MjA5NjM0MzkyN30.ziw1rJ1XQSfVjE16V9KaOEaV6Hfq7__2iOXfeE7gtUw"

const client =
supabase.createClient(
supabaseUrl,
supabaseKey
);

async function sendMessage(){

const msg =
document.getElementById("message").value;

if(!msg){
document.getElementById("status").innerText =
"Write a message first";
return;
}

const { error } =
await client
.from("messages")
.insert([
{ content: msg }
]);

if(error){
document.getElementById("status").innerText =
"Failed to send";
}
else{
document.getElementById("status").innerText =
"Message sent!";
document.getElementById("message").value="";
}

}

</script>

</body>
</html>
