<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>👾 Silent Drop | Anonymous Messages</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
overflow:hidden;
background:linear-gradient(
135deg,
#0f172a,
#312e81,
#4c1d95,
#1e293b
);
background-size:400% 400%;
animation:gradient 15s ease infinite;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
position:relative;
z-index:2;
width:90%;
max-width:420px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.7);
box-shadow:
0 0 30px rgba(139,92,246,.4),
0 0 60px rgba(99,102,241,.2);
animation:cardFloat 6s ease-in-out infinite;
}
  
textarea{
width:100%;
height:150px;
padding:15px;
border:none;
border-radius:15px;
box-sizing:border-box;
resize:none;
font-size:16px;
background:rgba(255,255,255,0.9);
}
 
 
button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#8b5cf6,#6366f1);
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.03);
box-shadow:0 0 25px rgba(139,92,246,.7);
}

#status{
margin-top:10px;
}
#status{
margin-top:10px;
}

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.7),transparent 35%),
radial-gradient(circle at 80% 40%,rgba(255,255,255,.4),transparent 35%),
radial-gradient(circle at 40% 80%,rgba(255,255,255,.4),transparent 35%);
animation:float 8s ease-in-out infinite alternate;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-80px);}
}

.credit{
text-align:center;
margin-top:20px;
font-size:13px;
color:rgba(255,255,255,.8);
letter-spacing:3px;
  }
#counter{
text-align:right;
margin-top:5px;
margin-bottom:10px;
font-size:12px;
color:rgba(255,255,255,0.7);
}
</style>
</head>

<body>

<div class="particles"></div>

<div class="card">

<h1>💬 Silent Drop</h1>

<p>Say whatever you want.</p>

<textarea id="message"
placeholder="Type your message..."></textarea>

<p id="counter">0/500</p>

<button onclick="sendMessage()">
Send
</button>

<p class="credit">👾 Silent Drop • By Rehaan</p>

<p id="status"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = "https://lwtxdmyduytcztgtbmwy.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHhkbXlkdXl0Y3p0Z3RibXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc5MjcsImV4cCI6MjA5NjM0MzkyN30.ziw1rJ1XQSfVjE16V9KaOEaV6Hfq7__2iOXfeE7gtUw"

const client =
supabase.createClient(
supabaseUrl,
supabaseKey
);
  
const textarea = document.getElementById("message");
const counter = document.getElementById("counter");

textarea.addEventListener("input", () => {
  counter.innerText = textarea.value.length + "/500";
});


async function sendMessage(){

const msg =
document.getElementById("message").value;

if(!msg){
document.getElementById("status").innerText =
"Write a message first";
return;
}

const { error } =
await client
.from("messages")
.insert([
{ content: msg }
]);

if(error){
document.getElementById("status").innerText =
"Failed to send";
}
else{
document.getElementById("status").innerText =
"Anonymous message sent!";
document.getElementById("message").value="";
}

}

</script>


</html>
