<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Drop</title>

<style>
body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
overflow:hidden;
background:linear-gradient(
-45deg,
#0f172a,
#1e293b,
#312e81,
#7c3aed
);
background-size:400% 400%;
animation:gradient 15s ease infinite;
color:white;
}

@keyframes gradient{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
width:90%;
max-width:420px;
padding:25px;
border-radius:25px;
background:rgba(255,255,255,0.08);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,0.1);
box-shadow:0 8px 32px rgba(0,0,0,.3);
}

.card{
width:90%;
max-width:400px;
background:#1e293b;
padding:25px;
border-radius:20px;
}

textarea{
width:100%;
height:120px;
padding:10px;
border-radius:10px;
margin-top:10px;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:linear-gradient(
90deg,
#8b5cf6,
#6366f1
);
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

#status{
margin-top:10px;
}
#status{
margin-top:10px;
}

.particles{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
background:
radial-gradient(circle at 20% 20%,rgba(255,255,255,.15),transparent 10%),
radial-gradient(circle at 80% 40%,rgba(255,255,255,.1),transparent 10%),
radial-gradient(circle at 40% 80%,rgba(255,255,255,.1),transparent 10%);
animation:float 10s infinite alternate;
}

@keyframes float{
from{transform:translateY(0);}
to{transform:translateY(-30px);}
}

</style>
</head>

<body>

<div class="particles"></div>

<div class="card">
<h1>💬 Silent Drop</h1>

<p>Say whatever you want.</p>

<textarea id="message"
placeholder="Type your message..."></textarea>

<button onclick="sendMessage()">
Send
</button>

<p id="status"></p>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<script>

const supabaseUrl = "https://lwtxdmyduytcztgtbmwy.supabase.co"
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3dHhkbXlkdXl0Y3p0Z3RibXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA3Njc5MjcsImV4cCI6MjA5NjM0MzkyN30.ziw1rJ1XQSfVjE16V9KaOEaV6Hfq7__2iOXfeE7gtUw"

const client =
supabase.createClient(
supabaseUrl,
supabaseKey
);

async function sendMessage(){

const msg =
document.getElementById("message").value;

if(!msg){
document.getElementById("status").innerText =
"Write a message first";
return;
}

const { error } =
await client
.from("messages")
.insert([
{ content: msg }
]);

if(error){
document.getElementById("status").innerText =
"Failed to send";
}
else{
document.getElementById("status").innerText =
"Message sent!";
document.getElementById("message").value="";
}

}

</script>

<div class="particles"></div>
  
</body>
</html>
